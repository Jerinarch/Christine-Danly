<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christine & Danly Wedding</title>

  <style>
    body {
      margin: 0;
      background: #f4ebe4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      /* Mobile browser height safe */
      overflow: hidden;
      font-family: 'Times New Roman', serif;
      overscroll-behavior: none;
      /* Prevent iOS bounce */
      touch-action: none;
      /* Lock pinch zooming at the root level */
    }

    /* WRAPPER */
    .wrapper {
      /* Mathematically guarantees the envelope stays physically proportional and NEVER touches the screen edges */
      width: min(85vw, calc(85dvh * (420 / 700)));
      height: min(85dvh, calc(85vw * (700 / 420)));
      max-width: 390px;
      /* Slight desktop limit reduction */
      max-height: 650px;
      perspective: 3000px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* =====================
   ELEGANT COVER LAYER
 ===================== */
    .cover {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 50;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(20, 10, 10, 0.65), rgba(60, 40, 30, 0.55)),
        url('front.png') center/cover no-repeat;
      background-color: #2a221d;
      /* Fallback if no front.png */
      backdrop-filter: blur(4px);
      border-radius: 14px;
      overflow: hidden;
      transition: opacity 0.8s ease;
    }

    .cover-inner {
      text-align: center;
      color: #fff;
      padding: 30px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      animation: fadeUp 1.2s ease;
    }

    .cover h1 {
      margin: 0;
      font-size: 38px;
      letter-spacing: 1px;
    }

    .cover p {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.9;
    }

    @keyframes fadeUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* =====================
   ENVELOPE & INTERACTABLES
 ===================== */
    .envelope-container {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      cursor: pointer;
      z-index: 10;
    }

    /* Envelope Back Background */
    .env-back {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #eadecd;
      background-image: url('front.png');
      background-size: cover;
      border-radius: 14px;
      box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

    /* Inner Card Setup & 3D Flipping */
    .card {
      position: absolute;
      width: 88%;
      left: 50%;
      top: 50%;
      z-index: 2;
      /* behind flaps initially */
      opacity: 0.85;
      border-radius: 8px;
      transform: translate(-50%, -50%) scale(0.95);
      transition: all 1.4s cubic-bezier(0.25, 1, 0.25, 1);
      perspective: 2000px;
      /* 3D context for the internal component flips */
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .card-inner {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 1.2s cubic-bezier(0.25, 1, 0.25, 1);
      border-radius: 8px;
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      width: 100%;
      backface-visibility: hidden;
      border-radius: 8px;
      overflow: hidden;
      background-color: #fdfcfb;
      /* Realistic white cardstock base */
      will-change: transform;
    }

    .card-front {
      position: relative;
      /* defines the height of the card! */
    }

    .card-back {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      transform: rotateY(180deg);
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Floating Rotate Button */
    .flip-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.05);
      color: #2b4533;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
      z-index: 30;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    /* Expands the invisible touch zone for iOS compatibility without altering visual size */
    .flip-btn::after {
      content: '';
      position: absolute;
      top: -15px;
      left: -15px;
      right: -15px;
      bottom: -15px;
    }

    .flip-btn svg {
      width: 16px;
      height: 16px;
    }

    .flip-btn:hover {
      background: white;
      transform: scale(1.1) rotate(15deg);
      /* Slight pop/rotate effect */
    }

    /* Zoomed Card State */
    .card.zoomed {
      transform: translate(-50%, -50%) scale(1.15) translateZ(60px);
      opacity: 1;
      z-index: 20;
      /* Pop above flaps */
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(0, 0, 0, 0.03);
    }

    /* Flaps */
    .flaps-container {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: auto;
      /* Allow flap clicks */
      perspective: 2000px;
    }

    .flap {
      position: absolute;
      width: 50%;
      height: 100%;
      top: 0;
      background-image: url('front.png');
      background-size: 200% 100%;
      background-color: #fdf8f5;
      transition: transform 1.2s cubic-bezier(0.68, -0.05, 0.15, 1);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.08);
      pointer-events: none;
      /* Disabled until band is removed */
    }

    /* Loose Physics states when band comes off */
    .flap.loose {
      pointer-events: auto;
      cursor: pointer;
    }

    .left-flap {
      left: 0;
      transform-origin: left;
      background-position: left;
      border-top-left-radius: 14px;
      border-bottom-left-radius: 14px;
      border-right: 1px solid rgba(0, 0, 0, 0.1);
    }

    .left-flap.loose {
      transform: rotateY(-8deg);
      /* Mild lift */
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.08), 8px 8px 20px -5px rgba(0, 0, 0, 0.2);
      /* Physical separation shadow */
    }

    .right-flap {
      right: 0;
      transform-origin: right;
      background-position: right;
      border-top-right-radius: 14px;
      border-bottom-right-radius: 14px;
      border-left: 1px solid rgba(0, 0, 0, 0.1);
    }

    .right-flap.loose {
      transform: rotateY(8deg);
      /* Mild lift */
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.08), -8px 8px 20px -5px rgba(0, 0, 0, 0.2);
    }

    /* Flap Open Animation (Independent) */
    .left-flap.open {
      transform: rotateY(-155deg) !important;
      box-shadow: inset -20px 0 30px rgba(0, 0, 0, 0.1);
      pointer-events: none;
    }

    .right-flap.open {
      transform: rotateY(155deg) !important;
      box-shadow: inset 20px 0 30px rgba(0, 0, 0, 0.1);
      pointer-events: none;
    }

    /* =====================
   OUTER RING / BAND
 ===================== */
    .band-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 8;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translateZ(5px);
      /* Forces realistic stacking context */
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
      touch-action: none;
      /* Prevents page scrolling while dragging on mobile */
      cursor: grab;
    }

    .band-layer:active {
      cursor: grabbing;
    }

    .band-layer.dragging {
      transition: none !important;
      /* Forces instant tracking with cursor */
    }

    .band-strap {
      position: absolute;
      left: -2%;
      width: 104%;
      /* Overhangs slightly over the envelope edge */
      height: 140px;
      background-color: #fcfcf8;
      /* Real paper base color */

      /* Multiple backgrounds: subtle curvature shadows on edges + paper noise texture */
      background-image:
        linear-gradient(90deg, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.3) 4%, transparent 15%, transparent 85%, rgba(255, 255, 255, 0.3) 96%, rgba(0, 0, 0, 0.15) 100%),
        url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.04"/></svg>');

      /* Very realistic close shadow + soft ambient shadow underneath */
      box-shadow:
        0 12px 15px -8px rgba(0, 0, 0, 0.3),
        0 -3px 8px -3px rgba(0, 0, 0, 0.1),
        inset 0 1px 1px rgba(255, 255, 255, 0.5),
        inset 0 -1px 1px rgba(0, 0, 0, 0.05);

      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8%;
      /* Increased right padding to push text further right */
      box-sizing: border-box;
      overflow: hidden;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      /* Physical paper cut edge */
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 2px;
      /* Very subtle softened edges */
    }

    .band-floral {
      position: absolute;
      left: -4%;
      top: -5px;
      width: 55%;
      /* Restored to its original larger visual presence */
      height: 200px;
      background-image: url('flowers.jpeg');
      background-size: contain;
      background-position: top left;
      background-repeat: no-repeat;
      mix-blend-mode: multiply;
      /* Blends the JPEG white background out */
      opacity: 0.95;
    }

    .band-text {
      display: flex;
      flex-direction: column;
      text-align: right;
      /* Changed to right-aligned for better visual flow on the right edge */
      color: rgba(46, 73, 55, 0.92);
      /* Slightly faded for that realistic ink look */
      font-family: 'Times New Roman', serif;
      transform: translateZ(10px);
      /* 3d depth text */
      text-shadow: 0 0.5px 1px rgba(255, 255, 255, 0.3);
      /* Letterpress effect */
      z-index: 2;
      max-width: 40%;
      /* Strictly limited to prevent overlap with the now-larger flowers */
    }

    .band-text span:first-child {
      font-size: min(7vw, 28px);
      /* Responsively shrinks without breaking */
      letter-spacing: 1px;
    }

    .band-text span:last-child {
      font-size: min(7vw, 28px);
      letter-spacing: 1px;
      margin-top: 5px;
    }


    /* SHADOW AND HINT */
    .shadow {
      position: absolute;
      width: 90%;
      height: 20px;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.3);
      filter: blur(15px);
      border-radius: 50%;
      opacity: 0.8;
      transition: opacity 1.2s ease;
      z-index: 1;
    }

    .hint {
      position: absolute;
      bottom: -45px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #7a6a5a;
      letter-spacing: 0.5px;
      transition: opacity 0.5s ease;
    }

    /* SLIDE HINT ARROWS */
    .slide-hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.6s ease;
    }

    .slide-hint svg {
      width: 30px;
      height: 30px;
      fill: #3b5a45;
      opacity: 0.6;
      animation: bounceHint 2s infinite ease-in-out;
    }

    .arrow-up {
      transform: rotate(180deg);
    }

    @keyframes bounceHint {

      0%,
      100% {
        transform: translateY(0) rotate(var(--rot, 0deg));
        opacity: 0.4;
      }

      50% {
        transform: translateY(var(--move, 10px)) rotate(var(--rot, 0deg));
        opacity: 0.8;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper" id="wrapper">

    <!-- STEP 2 & 3: ENVELOPE INTERACTION -->
    <div class="envelope-container" id="envelope-container">

      <!-- Envelope Background -->
      <div class="env-back"></div>

      <!-- Inner Card (Tucked Behind Flaps initially) -->
      <div class="card" id="card">
        <div class="card-inner" id="card-inner">
          <div class="card-face card-front">
            <img src="Engagement Invitation CD-1.png" alt="Engagement Card">
          </div>
          <div class="card-face card-back">
            <img src="Christine marriage Invitation.png" alt="Marriage Card">
          </div>
        </div>
        <!-- Rotator Action Button -->
        <button class="flip-btn" id="flip-btn" onclick="flipCard(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>

      <!-- Envelope Flaps -->
      <div class="flaps-container">
        <div class="flap left-flap" id="left-flap" onclick="openLeftFlap(event)"></div>
        <div class="flap right-flap" id="right-flap" onclick="openRightFlap(event)"></div>
      </div>

      <!-- Outer Belly Band (Floral Design) -->
      <div class="band-layer" id="band-layer">
        <div class="band-strap">
          <div class="band-floral"></div>

          <!-- Animated Slide Hints -->
          <div class="slide-hint" id="slide-hint">
            <svg class="arrow-up" style="--move: -10px; --rot: 180deg;" viewBox="0 0 24 24">
              <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" />
            </svg>
            <svg class="arrow-down" style="--move: 10px; --rot: 0deg;" viewBox="0 0 24 24">
              <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z" />
            </svg>
          </div>

          <div class="band-text">
            <span>CHRISTINE</span>
            <span>& DANLY</span>
          </div>
        </div>
      </div>

    </div>

    <div class="shadow"></div>
    <div class="hint" id="hint">Slide the seal up or down to remove the band</div>

  </div>

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    let state = 'banded'; // banded -> closed -> opened

    function playMusic() {
      const music = document.getElementById('music');
      if (music && music.paused) {
        music.play().catch(e => console.log('Audio autoplay blocked', e));
      }
    }

    const bandLayer = document.getElementById('band-layer');
    let startY = 0;
    let currentY = 0;
    let isDragging = false;
    let audioUnlocked = false;

    bandLayer.addEventListener('pointerdown', (e) => {
      if (state !== 'banded') return;

      // Hide the visual hints on first interaction
      const slideHint = document.getElementById('slide-hint');
      if (slideHint) slideHint.style.opacity = '0';

      // Firing within the exact pointerdown context circumvents strict iOS touch tracking restrictions
      if (!audioUnlocked) {
        playMusic();
        audioUnlocked = true;
      }

      isDragging = true;
      bandLayer.classList.add('dragging');
      startY = e.clientY - currentY;
      bandLayer.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });

    bandLayer.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      currentY = e.clientY - startY;
      bandLayer.style.transform = `translateY(${currentY}px)`;
      e.stopPropagation(); // Avoid interacting with envelope
    });

    bandLayer.addEventListener('pointerup', endDrag);
    bandLayer.addEventListener('pointercancel', endDrag);

    function endDrag(e) {
      if (!isDragging) return;
      isDragging = false;
      bandLayer.classList.remove('dragging');

      if (Math.abs(currentY) > 150) {
        // Slipped far enough, complete the removal
        let dir = currentY > 0 ? 1 : -1;
        bandLayer.style.transform = `translateY(${dir * 800}px) rotate(${dir * -15}deg)`;
        bandLayer.style.opacity = '0';
        bandLayer.style.pointerEvents = 'none';

        // Loosen the flaps
        document.getElementById('left-flap').classList.add('loose');
        document.getElementById('right-flap').classList.add('loose');

        state = 'flaps-ready';
        document.getElementById('hint').innerText = "Tap the flaps to open";
        playMusic();
      } else {
        // Snap back because it wasn't pulled far enough
        currentY = 0;
        bandLayer.style.transform = `translateY(0px)`;
      }
    }

    let leftOpen = false;
    let rightOpen = false;

    function openLeftFlap(event) {
      event.stopPropagation();
      if (state === 'flaps-ready' && !leftOpen) {
        playMusic();
        leftOpen = true;
        document.getElementById('left-flap').classList.add('open');
        checkBothFlaps();
      }
    }

    function openRightFlap(event) {
      event.stopPropagation();
      if (state === 'flaps-ready' && !rightOpen) {
        playMusic();
        rightOpen = true;
        document.getElementById('right-flap').classList.add('open');
        checkBothFlaps();
      }
    }

    function checkBothFlaps() {
      if (leftOpen && rightOpen) {
        document.getElementById('hint').style.opacity = '0';
        state = 'opened';

        // Zoom out the card smoothly after the last flap starts swinging
        setTimeout(() => {
          document.getElementById('card').classList.add('zoomed');
        }, 700);
      }
    }

    let isFlipped = false;
    function flipCard(event) {
      event.stopPropagation();
      isFlipped = !isFlipped;
      const inner = document.getElementById('card-inner');

      if (isFlipped) {
        inner.classList.add('flipped');
      } else {
        inner.classList.remove('flipped');
      }
    }
    // Ensure the page resets completely on mobile refresh / back-navigation
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        window.location.reload();
      }
    });
  </script>

</body>

</html>
